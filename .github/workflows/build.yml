name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# Needed to create tags and publish releases from the workflow.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history so release notes can diff against the previous tag.
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compute version
        id: ver
        run: |
          BASE=$(grep '^appVersionBase=' gradle.properties | cut -d= -f2)
          echo "version=${BASE}.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        # Only available for pushes (secrets are not exposed to fork PRs).
        if: github.event_name == 'push'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is empty. Add the four signing secrets (see CLAUDE.md → Versioning & Release Signing)."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"
          # Fail fast with a clear message if the keystore is corrupt (e.g. the
          # base64 secret was truncated on paste) instead of dying later at
          # packageRelease with an opaque ASN.1/keytool error.
          if ! keytool -list -keystore "$RUNNER_TEMP/release.jks" \
              -storepass "$KEYSTORE_PASSWORD" >/dev/null 2>&1; then
            echo "::error::Decoded keystore is invalid or the password is wrong. Re-set KEYSTORE_BASE64 from the exact base64 (no truncation) and verify KEYSTORE_PASSWORD."
            exit 1
          fi

      - name: Build release APK
        run: ./gradlew assembleRelease -PbuildNumber=${{ github.run_number }}
        env:
          KEYSTORE_PATH: ${{ github.event_name == 'push' && format('{0}/release.jks', runner.temp) || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/release/app-release.apk \
            "artifacts/wardove-v${{ steps.ver.outputs.version }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wardove-v${{ steps.ver.outputs.version }}
          path: artifacts/*.apk
          retention-days: 30

      - name: Publish release
        # Only publish a release for pushes to the main repo, not for PRs.
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Wardove v${{ steps.ver.outputs.version }}
          # Auto-generate the "What's Changed" changelog from merged PRs/commits
          # since the previous release, the same way open-source repos do.
          generate_release_notes: true
          files: artifacts/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
